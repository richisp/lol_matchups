<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LoL Matchups{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0e0e10;
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            margin: 0;
            padding: 1.5rem 2rem;
        }
        a { color: #5b8def; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 { font-weight: 300; margin: 0 0 1rem; letter-spacing: 0.5px; display: flex; align-items: center; gap: 0.75rem; }
        h1 img { width: 48px; height: 48px; border-radius: 6px; }
        h2 { font-weight: 400; font-size: 0.9rem; color: #999; margin: 0; text-transform: uppercase; letter-spacing: 0.8px; }
        /* Filter forms (champion list, matchup browser) — opt-in card style.
           The draft page's form has its own layout and shouldn't pick this up. */
        .filter-form {
            display: flex; flex-wrap: wrap; gap: 1rem; align-items: end;
            padding: 1rem; background: #18181b; border: 1px solid #2a2a2e;
            border-radius: 8px; margin-bottom: 1rem;
        }
        label { display: flex; flex-direction: column; font-size: 0.78rem; color: #888; gap: 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="number"] {
            background: #232328; color: #e6e6e6; border: 1px solid #34343a;
            padding: 0.45rem 0.6rem; border-radius: 4px; font-size: 0.95rem;
            font-family: inherit;
        }
        select[multiple] { min-width: 120px; }
        button {
            background: #5b8def; color: white; border: none;
            padding: 0.55rem 1.2rem; border-radius: 4px; cursor: pointer;
            font-size: 0.9rem; font-weight: 500;
        }
        button:hover { background: #6b9dff; }
        .meta { color: #777; font-size: 0.85rem; margin: 0.5rem 0 1rem; }
        .hint { color: #555; font-size: 0.8rem; }
        .empty { color: #666; padding: 3rem; text-align: center; }
        .nav { margin-bottom: 1rem; font-size: 0.9rem; }

        /* Champion list table */
        table { width: 100%; border-collapse: collapse; background: #18181b; border-radius: 8px; overflow: hidden; }
        th { background: #1f1f23; padding: 0.7rem 0.9rem; text-align: left; font-weight: 500; font-size: 0.78rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2a2e; }
        td { padding: 0.55rem 0.9rem; border-top: 1px solid #232328; }
        tr:hover td { background: #1c1c20; }
        .champ { display: flex; align-items: center; gap: 0.6rem; }
        .champ img { width: 32px; height: 32px; border-radius: 4px; }
        .champ a { color: #e6e6e6; text-decoration: none; }
        .champ a:hover { color: #5b8def; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }
        .winrate { font-weight: 600; }
        .winrate.good { color: #5cd65c; }
        .winrate.bad  { color: #e85a5a; }

        /* Matchup sections */
        .matchup-section {
            display: flex; gap: 1rem; padding: 0.6rem 1rem;
            background: #18181b; border: 1px solid #2a2a2e; border-radius: 8px;
            margin-bottom: 0.6rem; align-items: stretch;
        }
        .matchup-section .pos-label {
            width: 80px; min-width: 80px; display: flex; align-items: center;
            font-weight: 500; color: #aaa; text-transform: uppercase; font-size: 0.78rem; letter-spacing: 0.8px;
            border-right: 1px solid #2a2a2e; padding-right: 1rem;
        }
        .matchup-row {
            display: flex; gap: 0.4rem; overflow-x: auto;
            flex: 1; padding: 0.25rem 0;
        }
        .matchup-row::-webkit-scrollbar { height: 6px; }
        .matchup-row::-webkit-scrollbar-thumb { background: #34343a; border-radius: 3px; }
        .matchup-card {
            display: flex; flex-direction: column; align-items: center;
            min-width: 70px; padding: 0.4rem 0.3rem;
            background: #1f1f23; border-radius: 4px; text-align: center;
            text-decoration: none; color: inherit;
        }
        .matchup-card:hover { background: #26262b; text-decoration: none; }
        .matchup-card img { width: 44px; height: 44px; border-radius: 4px; }
        .matchup-card .wr { font-size: 0.92rem; font-weight: 600; margin-top: 0.3rem; }
        .matchup-card .wr.good { color: #5cd65c; }
        .matchup-card .wr.bad { color: #e85a5a; }
        .matchup-card .small { font-size: 0.7rem; color: #888; margin-top: 0.1rem; line-height: 1.2; }
        .empty-row { color: #555; font-size: 0.8rem; padding: 1rem; }

        .app-version {
            position: fixed;
            bottom: 0.4rem;
            right: 0.7rem;
            color: #555;
            font-size: 0.7rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.3px;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        /* Top nav: two buttons. The active one matches the current page. */
        .main-nav {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .main-nav a {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            background: #18181b;
            border: 1px solid #2a2a2e;
            border-radius: 6px;
            color: #aaa;
            font-size: 0.88rem;
            font-weight: 500;
            text-decoration: none;
            transition: border-color 0.12s, color 0.12s, background 0.12s;
        }
        .main-nav a:hover {
            border-color: #5b8def;
            color: #e6e6e6;
            text-decoration: none;
        }
        .main-nav a.active {
            background: #2a3a55;
            border-color: #5b8def;
            color: #e6e6e6;
        }

        /* Champion-page header: portrait + name + lane/tier meta. */
        .champion-header {
            display: flex; align-items: center; gap: 0.75rem;
            margin: 0 0 1rem;
        }
        .champion-portrait { width: 48px; height: 48px; border-radius: 6px; }
        .champion-title { font-size: 1.6rem; font-weight: 300; letter-spacing: 0.5px; }
        .champion-meta { color: #888; font-size: 0.95rem; }

        /* Tier picker shared by index + draft. Sized to match the role
           buttons (.role-btn) so the toolbar reads as a single row. */
        .tier-picker { padding: 0; gap: 0; }
        .tier-picker select {
            background: #232328;
            color: #aaa;
            border: 1px solid #34343a;
            border-radius: 6px;
            padding: 0.45rem 0.75rem;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
            cursor: pointer;
            transition: border-color 0.12s, color 0.12s, background 0.12s;
        }
        .tier-picker select:hover {
            border-color: #5b8def;
            color: #e6e6e6;
        }
        .tier-picker select:focus {
            outline: none;
            border-color: #5b8def;
            color: #e6e6e6;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="/" data-nav="index">Champions</a>
        <a href="/draft" data-nav="draft">Draft helper</a>
    </nav>
    {% block body %}{% endblock %}
    <div class="app-version">v{{ app_version }}</div>
    <script>
        // Mark whichever nav button matches the current page.
        (function () {
            const path = window.location.pathname;
            document.querySelectorAll('.main-nav a').forEach(a => {
                const href = a.getAttribute('href');
                const isHome = href === '/' && path === '/';
                const isMatch = href !== '/' && path.startsWith(href);
                if (isHome || isMatch) a.classList.add('active');
            });
        })();
    </script>
</body>
</html>
