name: Crawl lolalytics

on:
  schedule:
    # Daily at 04:00 UTC. Lanes run in parallel and reuse browsers, so a full
    # crawl is ~30–45min — well under the 2000 min/month free-tier ceiling
    # even on a private repo. GitHub may delay scheduled runs by a few
    # minutes during high load.
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Crawl mode'
        required: true
        default: full
        type: choice
        options:
          - full       # wipe scrape_runs, recrawl everything
          - failures   # only retry combos previously marked error/empty

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolve Playwright version
        id: pw-version
        run: |
          # The browser binary build is pinned to the installed playwright
          # package version, NOT to pyproject.toml (which only floats
          # `playwright>=1.45`). Key the cache off the actual installed version
          # so a Playwright upgrade invalidates the browser cache — otherwise a
          # stale cache "hits", the download step is skipped, and the new
          # chrome-headless-shell binary is never fetched.
          VERSION=$(python -c "import importlib.metadata as m; print(m.version('playwright'))")
          echo "Installed playwright: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser binaries
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Chromium (full)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Seed DB from prior db-latest release (if any)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view db-latest >/dev/null 2>&1; then
            echo "Prior db-latest release found — downloading as seed."
            gh release download db-latest --pattern lolalytics.db --clobber
          else
            echo "No prior release — using the DB committed in the repo as seed."
          fi
          ls -la lolalytics.db

      - name: Reset crawl state (full mode)
        if: ${{ github.event.inputs.mode != 'failures' }}
        run: |
          # Wipe scrape_runs so already-OK combos are re-crawled with fresh
          # data. The store_scrape_result fix wholesale-replaces stale matchup
          # rows on each champ-lane refresh, so we don't accumulate cruft.
          sqlite3 lolalytics.db "DELETE FROM scrape_runs;"

      - name: Reset failed/empty entries (failures mode)
        if: ${{ github.event.inputs.mode == 'failures' }}
        run: |
          sqlite3 lolalytics.db "DELETE FROM scrape_runs WHERE status IN ('error', 'empty');"

      - name: Crawl
        env:
          HEADLESS: '1'
        run: python crawl_champions.py

      - name: Generate version metadata + release body
        run: python .github/scripts/db_version.py

      - name: Upload to db-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: db-latest
          name: Latest DB snapshot
          body_path: db-version-body.md
          files: |
            lolalytics.db
            db-version.json
          # Don't make this the "Latest" release the GitHub UI surfaces — that
          # designation belongs to the app releases (vX.Y.Z).
          make_latest: 'false'
